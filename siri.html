<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siri 風格 AI 語音</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
    width: 100%;
    max-width: 480px;
    padding: 40px 24px;
  }

  /* Avatar area */
  .avatar-wrap {
    position: relative;
    width: 160px;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas#orbCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border-radius: 50%;
  }

  .avatar-img {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    position: relative;
    z-index: 2;
    background: #f0f0f5;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }

  /* Status */
  .status {
    font-size: 17px;
    color: #1d1d1f;
    font-weight: 400;
    letter-spacing: -0.2px;
    min-height: 24px;
    text-align: center;
  }

  /* Transcript */
  .transcript-box {
    width: 100%;
    min-height: 80px;
    background: #f5f5f7;
    border-radius: 18px;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .transcript-label {
    font-size: 11px;
    font-weight: 600;
    color: #86868b;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .transcript-text {
    font-size: 16px;
    color: #1d1d1f;
    line-height: 1.5;
    min-height: 24px;
  }

  /* Bottom Siri bar */
  .siri-bar-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  canvas#siriBar {
    width: 100%;
    height: 64px;
    border-radius: 32px;
    display: block;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 16px;
    width: 100%;
    justify-content: center;
  }
  .btn {
    padding: 14px 32px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    font-size: 16px;
    font-weight: 500;
    font-family: inherit;
    transition: all 0.2s;
    letter-spacing: -0.2px;
  }
  .btn-mic {
    background: #1d1d1f;
    color: white;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-mic:hover { background: #3a3a3c; transform: scale(1.02); }
  .btn-mic:active { transform: scale(0.98); }
  .btn-mic.recording {
    background: linear-gradient(135deg, #ff375f, #ff9f0a);
  }

  .pulse-ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.08);
    animation: pulseOut 2s ease-out infinite;
    pointer-events: none;
    z-index: 1;
  }
  @keyframes pulseOut {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.3); opacity: 0; }
  }
  .pulse-ring:nth-child(2) { animation-delay: 0.7s; }
  .pulse-ring:nth-child(3) { animation-delay: 1.4s; }
</style>
</head>
<body>
<div class="container">

  <!-- Orb Avatar -->
  <div class="avatar-wrap" id="avatarWrap">
    <canvas id="orbCanvas" width="320" height="320"></canvas>
    <div class="avatar-img">🏥</div>
  </div>

  <!-- Status -->
  <div class="status" id="status">こんにちは。今日はどうしましたか？</div>

  <!-- Transcript -->
  <div class="transcript-box">
    <div class="transcript-label">對話</div>
    <div class="transcript-text" id="transcriptText">—</div>
  </div>

  <!-- Siri bar + button -->
  <div class="siri-bar-wrap">
    <canvas id="siriBar" width="800" height="128"></canvas>
    <div class="btn-row">
      <button class="btn btn-mic" id="micBtn" onclick="toggleMic()">
        🎙 開始說話
      </button>
    </div>
  </div>

</div>

<script>
// ============================================================
// ORB — WebGL Shader (Siri iOS 18 style)
// ============================================================
const orbCanvas = document.getElementById('orbCanvas');
const gl = orbCanvas.getContext('webgl') || orbCanvas.getContext('experimental-webgl');

const vertSrc = `
attribute vec2 a_pos;
varying vec2 v_uv;
void main() {
  v_uv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`;

const fragSrc = `
precision highp float;
varying vec2 v_uv;
uniform float u_time;
uniform float u_amp;

vec3 palette(float t) {
  // Apple Siri colors: pink, purple, blue, mint
  vec3 a = vec3(0.85, 0.55, 0.85);
  vec3 b = vec3(0.35, 0.35, 0.40);
  vec3 c = vec3(1.00, 0.80, 1.00);
  vec3 d = vec3(0.00, 0.20, 0.50);
  return a + b * cos(6.28318 * (c * t + d));
}

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float a = hash(i);
  float b = hash(i + vec2(1.0, 0.0));
  float c = hash(i + vec2(0.0, 1.0));
  float d = hash(i + vec2(1.0, 1.0));
  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}

float fbm(vec2 p) {
  float v = 0.0;
  float a = 0.5;
  for (int i = 0; i < 5; i++) {
    v += a * noise(p);
    p = p * 2.0 + vec2(1.7, 9.2);
    a *= 0.5;
  }
  return v;
}

void main() {
  vec2 uv = v_uv * 2.0 - 1.0;
  float dist = length(uv);

  // Organic shape distortion
  float n1 = fbm(uv * 1.5 + u_time * 0.3);
  float n2 = fbm(uv * 2.0 - u_time * 0.2 + 3.7);
  vec2 distorted = uv + vec2(n1, n2) * (0.12 + u_amp * 0.25);
  float d = length(distorted);

  // Core orb
  float orb = smoothstep(0.85, 0.3, d);

  // Color
  float colorT = fbm(uv + u_time * 0.15) + u_time * 0.08;
  vec3 col = palette(colorT);

  // Inner glow variation
  float inner = fbm(uv * 3.0 + u_time * 0.4);
  col = mix(col, palette(colorT + 0.3), inner * 0.5);

  // Specular highlight
  vec2 hlPos = normalize(vec2(-0.4, 0.6));
  float hl = pow(max(0.0, dot(normalize(uv - vec2(-0.15, 0.2)), hlPos)), 4.0);
  col += hl * 0.4;

  // Outer glow
  float glow = exp(-d * 2.5) * 0.6 * (0.8 + u_amp * 0.8);
  vec3 glowCol = palette(colorT + 0.5) * 1.2;

  // Alpha
  float alpha = orb + glow * 0.5;
  col = mix(glowCol, col, orb / max(alpha, 0.001));

  // Fade edges
  float edge = 1.0 - smoothstep(0.7, 1.2, dist);

  gl_FragColor = vec4(col * alpha, alpha * edge);
}`;

function createShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, createShader(gl.VERTEX_SHADER, vertSrc));
gl.attachShader(prog, createShader(gl.FRAGMENT_SHADER, fragSrc));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

gl.enable(gl.BLEND);
gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

const uTime = gl.getUniformLocation(prog, 'u_time');
const uAmp  = gl.getUniformLocation(prog, 'u_amp');

let ampTarget = 0.1;
let ampCurrent = 0.1;

function renderOrb(t) {
  ampCurrent += (ampTarget - ampCurrent) * 0.05;
  gl.viewport(0, 0, 320, 320);
  gl.clearColor(0, 0, 0, 0);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.uniform1f(uTime, t * 0.001);
  gl.uniform1f(uAmp, ampCurrent);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ============================================================
// SIRI BAR — Canvas 2D
// ============================================================
const barCanvas = document.getElementById('siriBar');
const ctx = barCanvas.getContext('2d');
let barAmp = 0;
let barAmpTarget = 0;

function drawSiriBar(t) {
  const W = barCanvas.width, H = barCanvas.height;
  ctx.clearRect(0, 0, W, H);

  barAmp += (barAmpTarget - barAmp) * 0.08;

  // Background pill
  ctx.save();
  ctx.beginPath();
  roundRect(ctx, 0, 0, W, H, H / 2);
  ctx.fillStyle = '#f0f0f5';
  ctx.fill();
  ctx.restore();

  // Clip to pill
  ctx.save();
  ctx.beginPath();
  roundRect(ctx, 0, 0, W, H, H / 2);
  ctx.clip();

  // Wave lines
  const waves = [
    { hue: 280, offset: 0,   freq: 0.015, speed: 1.0 },
    { hue: 200, offset: 1.5, freq: 0.020, speed: 1.4 },
    { hue: 320, offset: 3.0, freq: 0.012, speed: 0.8 },
    { hue: 160, offset: 4.5, freq: 0.018, speed: 1.2 },
  ];

  waves.forEach((w, wi) => {
    const baseAmp = (8 + barAmp * 30) * (1 - wi * 0.15);
    ctx.beginPath();
    for (let x = 0; x <= W; x++) {
      const y = H / 2
        + Math.sin(x * w.freq + t * 0.001 * w.speed + w.offset) * baseAmp
        + Math.sin(x * w.freq * 2.3 + t * 0.0015 * w.speed + w.offset) * baseAmp * 0.4;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    const gradient = ctx.createLinearGradient(0, 0, W, 0);
    gradient.addColorStop(0,   `hsla(${w.hue}, 90%, 65%, 0)`);
    gradient.addColorStop(0.2, `hsla(${w.hue}, 90%, 65%, ${0.6 + barAmp * 0.3})`);
    gradient.addColorStop(0.8, `hsla(${w.hue + 40}, 90%, 65%, ${0.6 + barAmp * 0.3})`);
    gradient.addColorStop(1,   `hsla(${w.hue + 40}, 90%, 65%, 0)`);
    ctx.strokeStyle = gradient;
    ctx.lineWidth = 2.5;
    ctx.stroke();
  });

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
}

// ============================================================
// MAIN LOOP
// ============================================================
function loop(t) {
  renderOrb(t);
  drawSiriBar(t);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ============================================================
// MIC INTERACTION
// ============================================================
let isRecording = false;
let isSpeaking = false;
let recognition = null;
const micBtn = document.getElementById('micBtn');
const statusEl = document.getElementById('status');
const transcriptEl = document.getElementById('transcriptText');

const responses = [
  '少しお待ちください、確認します。',
  '頭痛はいつから始まりましたか？',
  '熱はありますか？',
  'アレルギーはありますか？',
  '承知しました。医師にお伝えします。',
  '少し休んでいてください。',
];

function speakResponse(text) {
  isSpeaking = true;
  ampTarget = 0.8;
  barAmpTarget = 1.0;
  statusEl.textContent = text;

  if ('speechSynthesis' in window) {
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'ja-JP';
    utt.rate = 0.95;
    utt.onend = () => {
      isSpeaking = false;
      ampTarget = 0.1;
      barAmpTarget = 0;
      statusEl.textContent = 'お話しください…';
    };
    speechSynthesis.speak(utt);
  } else {
    setTimeout(() => {
      isSpeaking = false;
      ampTarget = 0.1;
      barAmpTarget = 0;
      statusEl.textContent = 'お話しください…';
    }, 2500);
  }
}

function toggleMic() {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

function startRecording() {
  isRecording = true;
  ampTarget = 0.5;
  barAmpTarget = 0.6;
  micBtn.textContent = '⏹ 停止';
  micBtn.classList.add('recording');
  statusEl.textContent = 'お話しください…';
  transcriptEl.textContent = '聆聽中…';

  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'zh-TW';
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.onresult = (e) => {
      const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
      transcriptEl.textContent = transcript;
      // Simulate amplitude
      ampTarget = 0.4 + Math.random() * 0.4;
      barAmpTarget = 0.5 + Math.random() * 0.5;
    };
    recognition.onend = () => {
      if (isRecording) {
        stopRecording();
        const r = responses[Math.floor(Math.random() * responses.length)];
        setTimeout(() => speakResponse(r), 400);
      }
    };
    recognition.start();
  } else {
    // No speech API, simulate
    let t = 0;
    const sim = setInterval(() => {
      t++;
      ampTarget = 0.3 + Math.sin(t * 0.5) * 0.3;
      barAmpTarget = 0.4 + Math.sin(t * 0.7) * 0.4;
      if (t > 20) {
        clearInterval(sim);
        stopRecording();
        const r = responses[Math.floor(Math.random() * responses.length)];
        setTimeout(() => speakResponse(r), 400);
      }
    }, 150);
  }
}

function stopRecording() {
  isRecording = false;
  if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
  ampTarget = 0.1;
  barAmpTarget = 0;
  micBtn.textContent = '🎙 開始說話';
  micBtn.classList.remove('recording');
}
</script>
</body>
</html>
